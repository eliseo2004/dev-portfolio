<header class="header"> @if (isMobile && isMenuOpen) {
  <div class="mobile-overlay">
    <div class="nav-mobile">
      <div class="close-menu"><i class="icon-close close" (click)="closeMenu()"></i></div>
      <ul class="mobile-list"> @for (item of navItems; track item.fragment) {
        <li class="mobile-item"><a routerLink="/" [fragment]="item.fragment" class="mobile-link"
                                   (click)="closeMenu()"> {{ item.label | translate }} </a></li>
      } </ul>
    </div>
  </div>
}
  <nav class="navbar" [ngClass]="{ hidden: isMobile && isMenuOpen }">
    <ul class="navbar-list" [ngClass]="{ 'scrolled-bg': isWindowScrolled }">
      <div class="home-icon">
        <li class="navbar-item"><a routerLink="/" fragment="home" class="navbar-link"  (click)="scrollToHome($event)"> <i
          class="icon-home-outline home"></i> </a></li>
      </div> @for (item of navItems; track item.fragment) {
      <li class="navbar-item" [ngClass]="{ hidden: isMobile }"><a routerLink="/" [fragment]="item.fragment"
                                                                  class="navbar-link"> {{ item.label | translate }} </a>
      </li>
    }
      <li class="navbar-item" (click)="changeTheme()">
        <div class="navbar-link">
          <i [ngClass]="themeIcon"></i>
        </div>
      </li>
      <li class="navbar-item">
        <div class="navbar-link" (click)="changeLanguage()"><i class="icon-translate"></i></div>
      </li> @if (isMobile) {
      <div class="bar-icon" (click)="openMenu()">
        <li class="navbar-item">
          <div class="navbar-link"><i class="icon-menu"></i></div>
        </li>
      </div>
    } </ul>
  </nav>
  <app-about />
</header>
